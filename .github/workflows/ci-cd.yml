name: CI/CD Pipeline

on:
  pull_request:
    branches: [ develop, main ]
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: clinic_db_test
          POSTGRES_USER: clinic_user
          POSTGRES_PASSWORD: clinic_secure_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          DATABASE_URL: postgres://clinic_user:clinic_secure_password@localhost:5432/clinic_db_test
          SECRET_KEY: test-secret-key-not-used-in-production
          DEBUG: True
          ALLOWED_HOSTS: localhost,127.0.0.1
        run: |
          pytest appointments/tests/ -v

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Render Deploy
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }}