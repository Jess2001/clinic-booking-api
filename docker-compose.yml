
services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: clinic_db
      POSTGRES_USER: clinic_user
      POSTGRES_PASSWORD: clinic_secure_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data


  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgres://clinic_user:clinic_secure_password@db:5432/clinic_db
      - SECRET_KEY=django-insecure-dev-key-replace-in-production-123456789
      - DEBUG=True
    depends_on:
      - db


volumes:
  postgres_data: